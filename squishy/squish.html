<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foam Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8e4dc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
            user-select: none;
        }

        #canvas-container {
            position: relative;
            cursor: pointer;
        }

        canvas {
            display: block;
        }

        .hint {
            margin-top: 18px;
            color: #aaa49a;
            font-size: 12px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>
    <div id="canvas-container"></div>
    <div class="hint">press &amp; hold to squish</div>

    <script>
        new p5(function (p) {

            let press = 0;      // 0 = rest, 1 = fully pressed
            let pressVel = 0;      // spring velocity
            let isPressed = false;

            const STIFFNESS = 0.18;
            const DAMPING = 0.55;
            const PRESS_RATE = 0.07;
            const DETAIL = 48;

            let noiseOff = 0;

            p.setup = function () {
                let cnv = p.createCanvas(500, 500, p.WEBGL);
                cnv.parent('canvas-container');
                p.smooth();
                p.noStroke();
            };

            p.draw = function () {
                p.background(232, 228, 220);

                let target = isPressed ? 1 : 0;
                let spring = (target - press) * STIFFNESS;
                pressVel = (pressVel + spring) * DAMPING;
                press = p.constrain(press + pressVel, 0, 1);

                let squishY = 1 - press * 0.38;          // compress vertically
                let squishXZ = 1 + press * 0.22;          // bulge outward
                let dropY = press * 38;                 // sink down slightly

                let jiggle = Math.abs(pressVel);

                let radius = 130;

                p.ambientLight(210, 205, 200);
                p.directionalLight(255, 252, 245, 0.4, -0.8, 0.6);   // main warm top-left
                p.directionalLight(200, 215, 255, -0.3, 0.2, 0.5);   // cool fill right
                p.pointLight(255, 245, 220, -160, -220, 200);         // warm key point


                drawShadow(squishXZ, press, dropY);

                p.push();
                p.translate(0, dropY, 0);
                p.scale(squishXZ * radius, squishY * radius, squishXZ * radius);

                p.ambientMaterial(245, 240, 232);
                p.specularMaterial(255, 252, 248);
                p.shininess(12);

                p.sphere(1, DETAIL, DETAIL);
                p.pop();

                if (press > 0.02) {
                    drawDimple(press, squishY, squishXZ, dropY, radius);
                }

                noiseOff += 0.004;
            };

            function drawShadow(squishXZ, press, dropY) {
                p.push();
                let floorY = 148;
                p.translate(0, floorY, -10);
                p.rotateX(Math.PI / 2);
                p.noStroke();

                let shadowW = (180 + press * 45) * squishXZ;
                let shadowH = (80 + press * 20);
                let shadowA = 28 + press * 22;

                const layers = [
                    { sw: 1.6, sh: 1.6, a: shadowA * 0.25 },
                    { sw: 1.3, sh: 1.3, a: shadowA * 0.40 },
                    { sw: 1.1, sh: 1.1, a: shadowA * 0.60 },
                    { sw: 1.0, sh: 1.0, a: shadowA },
                ];
                layers.forEach(({ sw, sh, a }) => {
                    p.fill(160, 150, 135, a);
                    p.ellipse(0, 0, shadowW * sw, shadowH * sh);
                });
                p.pop();
            }

            function drawDimple(press, squishY, squishXZ, dropY, radius) {
                p.push();
                let bottomY = dropY + squishY * radius - 2;
                p.translate(0, bottomY, 0);
                p.rotateX(Math.PI / 2);
                p.noStroke();

                let dimpleR = press * 38 * squishXZ;
                for (let i = 3; i >= 1; i--) {
                    p.fill(180, 165, 148, press * 30 * (i / 3));
                    p.ellipse(0, 0, dimpleR * (1 + i * 0.3), dimpleR * (0.4 + i * 0.1));
                }
                p.pop();
            }

            p.mousePressed = function () { isPressed = true; };
            p.mouseReleased = function () { isPressed = false; };
            p.touchStarted = function () { isPressed = true; return false; };
            p.touchEnded = function () { isPressed = false; return false; };
        });
    </script>
</body>

</html>
